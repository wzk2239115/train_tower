stage: world_pt
init_mode: scratch
weight_init: random
model_config_path: configs/model/sensenova_500m_mot
tokenizer_name_or_path: configs/tokenizer/qwen3
datasets: "blip3o_long_pt,blip3o_short_pt"
use_flow_tower: true
loss_weights:
  ce: 0.0
  fm: 0.0
tower_decoder_prob: 0.0
max_steps: 50000
output_dir: outputs/pretrain/world_pt
deepspeed: configs/deepspeed/zero2.json
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
warmup_steps: 500
max_seq_length: 8192
max_pixels: 4194304
min_pixels: 65536
gradient_checkpointing: true
bf16: true
logging_steps: 10
save_steps: 5000
save_total_limit: 2
dataloader_num_workers: 2
tower_self_cond_prob: 0.0
