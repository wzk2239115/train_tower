stage: unified_sft
init_mode: checkpoint
model_name_or_path: outputs/pretrain/mt
tokenizer_name_or_path: outputs/pretrain/mt
datasets: "llava150k_sft,sharegpt4v_sft,refcoco_sft,textcaps_sft,docvqa_sft,chartqa_sft"
use_flow_tower: true
loss_weights:
  ce: 1.0
  fm: 0.1
tower_decoder_prob: 0.3
tower_self_cond_prob: 0.2
tower_self_cond_cfg_min: 1.0
tower_self_cond_cfg_max: 1.5
cfg_label_drop_prob: 0.10
max_steps: 4500
output_dir: outputs/pretrain/sft
deepspeed: configs/deepspeed/zero2.json
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
learning_rate: 1.2e-4
warmup_steps: 200
max_seq_length: 16384
max_pixels: 4194304
min_pixels: 65536
gradient_checkpointing: true
bf16: true
logging_steps: 10
save_steps: 1000
save_total_limit: 2
dataloader_num_workers: 2
